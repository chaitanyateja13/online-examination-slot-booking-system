{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fas fa-university fa-3x text-primary mb-3"></i>
            <h3 class="fw-bold text-dark">EMS Portal</h3>
            <p class="text-muted">Enter your credentials to access your account</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger shadow-sm">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted fw-bold small">USERNAME</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">PASSWORD</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                Sign In <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="#" class="text-muted text-decoration-none small">Forgot Password? Contact Admin.</a>
        </div>
    </div>
</div>
{% endblock %}
