{% extends 'base.html' %}
{% block page_title %}Add New Student{% endblock %}
{% block content %}
<div class="card dashboard-card w-50 mx-auto">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-4">Register Student</h5>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">USERNAME</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">EMAIL</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">ROLL NUMBER</label>
                <input type="text" name="roll_number" class="form-control" required>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label small text-muted fw-bold">DEPARTMENT</label>
                    <input type="text" name="department" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label small text-muted fw-bold">SEMESTER</label>
                    <input type="number" name="semester" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Create Student</button>
        </form>
    </div>
</div>
{% endblock %}
