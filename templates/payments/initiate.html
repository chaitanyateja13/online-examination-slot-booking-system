{% extends 'base.html' %}

{% block page_title %}Fee Payment{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card dashboard-card text-center p-4">
            <i class="fas fa-file-invoice-dollar fa-4x text-primary mb-3"></i>
            <h4 class="fw-bold mb-1">Semester {{ payment.semester }} Fee</h4>
            <p class="text-muted mb-4">Total Amount Due: <strong class="text-dark fs-5">₹{{ payment.amount }}</strong></p>
            
            <div class="alert alert-info text-start small mb-4">
                <i class="fas fa-info-circle me-1"></i> You must clear your semester fee to be eligible for booking exam slots.
            </div>
            
            <a href="{% url 'mock_payment_gateway' payment.id %}" class="btn btn-primary py-2 fw-bold w-100">
                Proceed to Secure Payment Gateway
            </a>
        </div>
    </div>
</div>
{% endblock %}
